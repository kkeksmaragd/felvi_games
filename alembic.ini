# Alembic configuration for felvi_games
# The DB URL is read dynamically in env.py from the same source as the app
# (FELVI_DB env var / default data/felvi.db).
# You can also override it here for a specific target:
#   sqlalchemy.url = sqlite:///W:/Users/Felvi/felvi.db

[alembic]
script_location = migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os

# Leave blank – env.py reads the URL from config.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
